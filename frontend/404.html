<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — E-Katalog Kantin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* Radial glow di tengah */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,168,118,0.07) 0%, transparent 65%);
            pointer-events: none;
        }

        .wrap {
            text-align: center;
            max-width: 400px;
            position: relative;
        }

        /* 404 */
        .num {
            font-size: clamp(96px, 22vw, 148px);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -4px;
            color: #161616;
            position: relative;
            display: inline-block;
        }

        .num::after {
            content: '404';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00a876 0%, #00e5a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.18;
        }

        /* Dot separator */
        .dot {
            display: inline-block;
            width: 6px; height: 6px;
            background: #00a876;
            border-radius: 50%;
            margin: 20px auto 20px;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: -0.3px;
        }

        p {
            font-size: 14px;
            color: rgba(255,255,255,0.38);
            line-height: 1.65;
            margin-bottom: 32px;
        }

        /* Buttons */
        .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .btn-primary {
            background: #00a876;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 11px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-primary:hover {
            background: #00c98e;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,168,118,0.35);
            color: #fff;
        }

        .btn-ghost {
            background: transparent;
            color: rgba(255,255,255,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 11px 20px;
            font-size: 14px;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-ghost:hover {
            border-color: rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
        }

        /* Brand */
        .brand {
            position: fixed;
            top: 24px; left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .brand:hover { opacity: 1; }
        .brand img { border-radius: 7px; }
        .brand span {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
        }

    </style>
</head>
<body>

    <a href="index.html" class="brand">
        <img src="images/logo.png" alt="Logo" width="26" height="26">
        <span>E-Katalog Kantin</span>
    </a>

    <div class="wrap">
        <div class="num">404</div>
        <div class="dot"></div>
        <h1>Halaman tidak ditemukan</h1>
        <br><p>Yuk balik ke katalog!</p>

        <div class="actions">
            <button class="btn-ghost" onclick="history.back()">
            <i class="bi bi-arrow-left"></i> Kembali
            </button>
            <a href="index.html" class="btn-primary">
                <i class="bi bi-house-fill"></i> Ke Beranda
            </a>
        </div>

    </div>

</body>
</html>

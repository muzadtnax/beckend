<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk - E-Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== LAYOUT ===== */
        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 20px;
            transition: color 0.2s;
        }
        .back-nav:hover { color: #fff; }

        .form-card {
            background: #141414;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 20px;
            padding: 28px;
        }

        .form-card h3 {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 24px;
            text-align: center;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-label {
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control,
        .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            padding: 10px 14px;
            transition: all 0.2s;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(0,168,118,0.08);
            border-color: #00a876;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(0,168,118,0.15);
        }

        .form-control::placeholder { color: rgba(255,255,255,0.25); }

        .form-select option { background: #1a1a1a; color: #fff; }

        /* Invalid */
        .form-control.is-invalid,
        .form-select.is-invalid {
            border-color: #ff4d4d !important;
            background: rgba(255,77,77,0.05) !important;
        }

        .err-msg {
            font-size: 12px;
            color: #ff6b6b;
            margin-top: 5px;
            display: none;
        }

        .is-invalid ~ .err-msg { display: block; }

        /* Alert */
        .alert-error {
            background: rgba(255,77,77,0.1);
            border: 1px solid rgba(255,77,77,0.3);
            border-radius: 10px;
            color: #ff6b6b;
            font-size: 13px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }
        .alert-error.show { display: flex; }

        /* ===== IMAGE PICKER ===== */
        .img-preview-box {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: rgba(255,255,255,0.04);
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 10px;
            position: relative;
            /* FIX: pastikan tidak overflow layar */
            max-width: 100%;
        }

        .img-preview-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .img-placeholder {
            text-align: center;
            color: rgba(255,255,255,0.2);
        }

        .img-placeholder i { font-size: 36px; display: block; margin-bottom: 6px; }
        .img-placeholder span { font-size: 12px; }

        .btn-remove-img {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            border-radius: 50%;
            width: 28px; height: 28px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .btn-remove-img:hover { background: rgba(255,77,77,0.8); }

        .img-picker-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-img-option {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: rgba(255,255,255,0.6);
            font-size: 13px;
            font-weight: 500;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: all 0.2s;
        }
        .btn-img-option:hover {
            background: rgba(0,168,118,0.1);
            border-color: rgba(0,168,118,0.3);
            color: #00a876;
        }
        .btn-img-option i { font-size: 16px; }

        /* ===== HARGA PREFIX ===== */
        .input-rp {
            position: relative;
        }
        .input-rp .rp-prefix {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            pointer-events: none;
            z-index: 2;
        }
        .input-rp .form-control { padding-left: 34px; }

        /* ===== BUTTONS ===== */
        .btn-save {
            background: #00a876;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-save:hover {
            background: #00c98e;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(0,168,118,0.4);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            text-decoration: none;
            margin-top: 14px;
            transition: color 0.2s;
        }
        .btn-cancel:hover { color: rgba(255,255,255,0.7); }

        /* ===== CAMERA MODAL ===== */
        #camera-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.97);
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #camera-stream {
            width: 100%;
            max-width: 480px;
            max-height: 60vh;
            border-radius: 12px;
            background: #000;
            object-fit: cover;
        }

        .camera-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn-capture {
            background: #00a876;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-capture:hover { background: #00c98e; }

        .btn-close-cam {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 12px 20px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-close-cam:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <!-- CAMERA MODAL -->
    <div id="camera-modal">
        <video id="camera-stream" autoplay playsinline></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div class="camera-actions">
            <button type="button" class="btn-capture" id="btn-capture">
                <i class="bi bi-camera-fill me-2"></i>Ambil Foto
            </button>
            <button type="button" class="btn-close-cam" id="btn-close-camera">Batal</button>
        </div>
    </div>

    <div class="container py-5" style="max-width: 480px;">

        <a href="index.html" class="back-nav">
            <i class="bi bi-arrow-left"></i> Kembali
        </a>

        <div class="form-card">
            <h3>Tambah Produk</h3>

            <!-- Alert error -->
            <div class="alert-error" id="alert-error">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="alert-msg">Harap isi semua kolom yang wajib diisi.</span>
            </div>

            <form id="form-add-produk" method="POST" enctype="multipart/form-data" novalidate>

                <!-- Gambar Produk -->
                <div class="mb-3">
                    <label class="form-label">Gambar Produk</label>
                    <div class="img-preview-box" id="img-preview-box">
                        <img id="img-preview" src="" alt="Preview">
                        <div class="img-placeholder" id="img-placeholder">
                            <i class="bi bi-image"></i>
                            <span>Belum ada gambar</span>
                        </div>
                        <button type="button" class="btn-remove-img" id="btn-remove-img" title="Hapus">
                            <i class="bi bi-x"></i>
                        </button>
                    </div>
                    <div class="img-picker-actions">
                        <button type="button" class="btn-img-option" id="btn-choose-file">
                            <i class="bi bi-folder2-open"></i> Pilih File
                        </button>
                        <button type="button" class="btn-img-option" id="btn-open-camera">
                            <i class="bi bi-camera"></i> Buka Kamera
                        </button>
                    </div>
                    <input type="file" id="input-file" name="gambar" accept="image/*" style="display:none">
                </div>

                <!-- Nama Produk -->
                <div class="mb-3">
                    <label class="form-label">Nama Produk <span style="color:#ff6b6b">*</span></label>
                    <input type="text" id="nama-produk" name="nama_produk" class="form-control" placeholder="Masukkan nama produk">
                    <div class="err-msg">Nama produk wajib diisi.</div>
                </div>

                <!-- Stok & Harga -->
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Stok <span style="color:#ff6b6b">*</span></label>
                        <input type="text" inputmode="numeric" id="stok-produk" name="stok" class="form-control" placeholder="0">
                        <div class="err-msg">Stok wajib diisi.</div>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Harga <span style="color:#ff6b6b">*</span></label>
                        <div class="input-rp">
                            <span class="rp-prefix">Rp</span>
                            <input type="text" inputmode="numeric" id="harga-produk" name="harga" class="form-control" placeholder="0">
                        </div>
                        <div class="err-msg" id="harga-err">Harga wajib diisi.</div>
                    </div>
                </div>

                <!-- Kategori -->
                <div class="mb-4">
                    <label class="form-label">Kategori <span style="color:#ff6b6b">*</span></label>
                    <select id="kategori-produk" name="kategori_id" class="form-select">
                        <option value="" disabled selected>Memuat kategori...</option>
                    </select>
                    <div class="err-msg">Kategori wajib dipilih.</div>
                </div>

                <!-- Deskripsi -->
                <div class="mb-4">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="deskripsi-produk" name="deskripsi" class="form-control" placeholder="Masukkan deskripsi produk (opsional)" rows="4" style="resize: vertical; min-height: 100px;"></textarea>
                </div>

                <button type="submit" class="btn-save">Simpan Produk</button>
                <a href="index.html" class="btn-cancel">Batal</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        // ===== VALIDASI FORM =====
        const form      = document.getElementById('form-add-produk');
        const alertBox  = document.getElementById('alert-error');
        const alertMsg  = document.getElementById('alert-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const fields = [
                { el: document.getElementById('nama-produk'),     label: 'Nama Produk' },
                { el: document.getElementById('stok-produk'),     label: 'Stok' },
                { el: document.getElementById('harga-produk'),    label: 'Harga' },
                { el: document.getElementById('kategori-produk'), label: 'Kategori' },
            ];

            let valid = true;
            const kosong = [];

            fields.forEach(f => f.el.classList.remove('is-invalid'));
            alertBox.classList.remove('show');

            fields.forEach(f => {
                if (!f.el.value || f.el.value.trim() === '') {
                    f.el.classList.add('is-invalid');
                    kosong.push(f.label);
                    valid = false;
                }
            });

            if (!valid) {
                alertMsg.textContent = `Kolom berikut wajib diisi: ${kosong.join(', ')}.`;
                alertBox.classList.add('show');
                alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                return;
            }

            if (typeof handleAddProduk === 'function') handleAddProduk(e);
        });

        document.querySelectorAll('.form-control, .form-select').forEach(el => {
            el.addEventListener('input', function() { this.classList.remove('is-invalid'); });
        });

        // ===== STOK: angka saja =====
        const stokEl = document.getElementById('stok-produk');
        stokEl.addEventListener('keydown', e => {
            const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
            if (allowed.includes(e.key)) return;
            if (!/^\d$/.test(e.key)) e.preventDefault();
        });
        stokEl.addEventListener('input', () => {
            stokEl.value = stokEl.value.replace(/\D/g, '');
        });

        // ===== HARGA: angka + format Rp titik setiap 3 digit =====
        const hargaEl = document.getElementById('harga-produk');
        hargaEl.addEventListener('keydown', e => {
            const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
            if (allowed.includes(e.key)) return;
            if (!/^\d$/.test(e.key)) e.preventDefault();
        });
        hargaEl.addEventListener('input', () => {
            const raw = hargaEl.value.replace(/\D/g, '');
            hargaEl.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g, '.') : '';
        });

        // ===== IMAGE PICKER =====
        const inputFile      = document.getElementById('input-file');
        const imgPreview     = document.getElementById('img-preview');
        const imgPlaceholder = document.getElementById('img-placeholder');
        const btnRemove      = document.getElementById('btn-remove-img');
        let activeStream     = null;

        function showPreview(src) {
            imgPreview.src = src;
            imgPreview.style.display = 'block';
            imgPlaceholder.style.display = 'none';
            btnRemove.style.display = 'flex';
        }

        function clearPreview() {
            imgPreview.src = '';
            imgPreview.style.display = 'none';
            imgPlaceholder.style.display = 'block';
            btnRemove.style.display = 'none';
            inputFile.value = '';
        }

        // Pilih file
        document.getElementById('btn-choose-file').addEventListener('click', () => inputFile.click());
        inputFile.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => showPreview(ev.target.result);
            reader.readAsDataURL(file);
        });

        // Buka kamera pakai getUserMedia (bukan file input)
        document.getElementById('btn-open-camera').addEventListener('click', async () => {
            try {
                activeStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' }
                });
                document.getElementById('camera-stream').srcObject = activeStream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch (err) {
                alert('Tidak bisa mengakses kamera: ' + err.message);
            }
        });

        // Ambil foto
        document.getElementById('btn-capture').addEventListener('click', () => {
            const video  = document.getElementById('camera-stream');
            const canvas = document.getElementById('camera-canvas');
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            showPreview(canvas.toDataURL('image/jpeg'));
            stopCamera();
        });

        // Tutup kamera
        document.getElementById('btn-close-camera').addEventListener('click', stopCamera);

        function stopCamera() {
            if (activeStream) {
                activeStream.getTracks().forEach(t => t.stop());
                activeStream = null;
            }
            document.getElementById('camera-modal').style.display = 'none';
        }

        btnRemove.addEventListener('click', clearPreview);

        // ===== POPULATE KATEGORI (dari API) =====
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof populateKategoriDropdown === 'function') {
                await populateKategoriDropdown();
            }
        });
    </script>
</body>
</html>

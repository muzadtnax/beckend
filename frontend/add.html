<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk — E-Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- CAMERA MODAL -->
    <div class="camera-modal" id="camera-modal">
        <video id="camera-stream" autoplay playsinline></video>
        <canvas id="camera-canvas" style="display:none;"></canvas>
        <div class="camera-actions">
            <button type="button" class="btn-capture" id="btn-capture">
                <i class="bi bi-camera-fill me-1"></i>Ambil Foto
            </button>
            <button type="button" class="btn-close-cam" id="btn-close-camera">Batal</button>
        </div>
    </div>

    <!-- CROP MODAL -->
    <div class="crop-modal" id="crop-modal">
        <div class="crop-modal-inner">
            <p class="crop-modal-title">Sesuaikan Gambar</p>
            <div class="crop-container">
                <img id="crop-image" src="" alt="Crop">
            </div>
            <div class="crop-toolbar">
                <button type="button" class="btn-crop-tool" id="btn-crop-zoom-in"  title="Zoom In"><i class="bi bi-zoom-in"></i></button>
                <button type="button" class="btn-crop-tool" id="btn-crop-zoom-out" title="Zoom Out"><i class="bi bi-zoom-out"></i></button>
                <button type="button" class="btn-crop-tool" id="btn-crop-rotate-l" title="Putar Kiri"><i class="bi bi-arrow-counterclockwise"></i></button>
                <button type="button" class="btn-crop-tool" id="btn-crop-rotate-r" title="Putar Kanan"><i class="bi bi-arrow-clockwise"></i></button>
                <button type="button" class="btn-crop-tool" id="btn-crop-flip-h"   title="Flip Horizontal"><i class="bi bi-symmetry-vertical"></i></button>
                <button type="button" class="btn-crop-tool" id="btn-crop-flip-v"   title="Flip Vertikal"><i class="bi bi-symmetry-horizontal"></i></button>
            </div>
            <div class="crop-actions">
                <button type="button" class="btn-crop-confirm" id="btn-crop-confirm"><i class="bi bi-check-lg me-1"></i>Gunakan</button>
                <button type="button" class="btn-crop-cancel"  id="btn-crop-cancel">Batal</button>
            </div>
        </div>
    </div>

    <div class="form-page">

        <a href="index.html" class="back-nav">
            <i class="bi bi-arrow-left"></i> Kembali
        </a>

        <div class="form-card">
            <div class="form-card-header">
                <span class="form-card-title">Tambah Produk</span>
            </div>

            <div class="alert-error" id="alert-error">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="alert-msg"></span>
            </div>

            <form id="form-add-produk" method="POST" enctype="multipart/form-data" novalidate>

                <!-- Gambar -->
                <div class="mb-3">
                    <label class="form-label">Gambar Produk</label>
                    <div class="img-preview-box" id="img-preview-box">
                        <img id="img-preview" src="" alt="Preview">
                        <div class="img-placeholder" id="img-placeholder">
                            <i class="bi bi-image"></i>
                            <span>Belum ada gambar</span>
                        </div>
                        <button type="button" class="btn-remove-img" id="btn-remove-img">
                            <i class="bi bi-x"></i>
                        </button>
                        <button type="button" class="btn-edit-img" id="btn-edit-img" title="Edit gambar">
                            <i class="bi bi-crop"></i>
                        </button>
                    </div>
                    <div class="img-picker-actions">
                        <button type="button" class="btn-img-option" id="btn-choose-file">
                            <i class="bi bi-folder2-open"></i> Pilih File
                        </button>
                        <button type="button" class="btn-img-option" id="btn-open-camera">
                            <i class="bi bi-camera"></i> Buka Kamera
                        </button>
                    </div>
                    <input type="file" id="input-file" name="gambar" accept="image/*" style="display:none">
                </div>

                <!-- Nama -->
                <div class="mb-3">
                    <label class="form-label">Nama Produk <span class="req">*</span></label>
                    <input type="text" id="nama-produk" class="form-control" placeholder="Masukkan nama produk">
                    <label class="form-label">Nama Produk <span style="color:#ff6b6b">*</span></label>
                    <input type="text" id="nama-produk" name="nama_produk" class="form-control" placeholder="Masukkan nama produk">
                    <div class="err-msg">Nama produk wajib diisi.</div>
                </div>

                <!-- Stok & Harga -->
                <div class="row g-3 mb-3">
                    <div class="col-6">
                        <label class="form-label">Stok <span class="req">*</span></label>
                        <input type="text" inputmode="numeric" id="stok-produk" class="form-control" placeholder="0">
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Stok <span style="color:#ff6b6b">*</span></label>
                        <input type="text" inputmode="numeric" id="stok-produk" name="stok" class="form-control" placeholder="0">
                        <div class="err-msg">Stok wajib diisi.</div>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Harga <span class="req">*</span></label>
                        <div class="input-rp">
                            <span class="rp-prefix">Rp</span>
                            <input type="text" inputmode="numeric" id="harga-produk" name="harga" class="form-control" placeholder="0">
                        </div>
                        <div class="err-msg">Harga wajib diisi.</div>
                    </div>
                </div>

                <!-- Kategori -->
                <div class="mb-4">
                    <label class="form-label">Kategori <span class="req">*</span></label>
                    <select id="kategori-produk" class="form-select">
                    <label class="form-label">Kategori <span style="color:#ff6b6b">*</span></label>
                    <select id="kategori-produk" name="kategori_id" class="form-select">
                        <option value="" disabled selected>Memuat kategori...</option>
                    </select>
                    <div class="err-msg">Kategori wajib dipilih.</div>
                </div>

                <!-- Deskripsi -->
                <div class="mb-4">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="deskripsi-produk" name="deskripsi" class="form-control" placeholder="Masukkan deskripsi produk (opsional)" rows="4" style="resize: vertical; min-height: 100px;"></textarea>
                </div>

                <button type="submit" class="btn-save">Simpan Produk</button>
                <a href="index.html" class="btn-cancel">Batal</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.1/dist/cropper.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/cropper-init.js"></script>
    <script>
        // Validasi
        const form     = document.getElementById('form-add-produk');
        const alertBox = document.getElementById('alert-error');
        const alertMsg = document.getElementById('alert-msg');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const fields = [
                { el: document.getElementById('nama-produk'),     label: 'Nama Produk' },
                { el: document.getElementById('stok-produk'),     label: 'Stok' },
                { el: document.getElementById('harga-produk'),    label: 'Harga' },
                { el: document.getElementById('kategori-produk'), label: 'Kategori' },
            ];
            let valid = true; const kosong = [];
            fields.forEach(f => f.el.classList.remove('is-invalid'));
            alertBox.classList.remove('show');
            fields.forEach(f => {
                if (!f.el.value || !f.el.value.trim()) {
                    f.el.classList.add('is-invalid'); kosong.push(f.label); valid = false;
                }
            });
            if (!valid) {
                alertMsg.textContent = `Wajib diisi: ${kosong.join(', ')}.`;
                alertBox.classList.add('show');
                alertBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                return;
            }
            if (typeof handleAddProduk === 'function') handleAddProduk(e);
        });

        document.querySelectorAll('.form-control, .form-select').forEach(el => {
            el.addEventListener('input', function() { this.classList.remove('is-invalid'); });
        });

        // Stok — angka saja
        const stokEl = document.getElementById('stok-produk');
        stokEl.addEventListener('keydown', e => {
            if (['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'].includes(e.key)) return;
            if (!/^\d$/.test(e.key)) e.preventDefault();
        });
        stokEl.addEventListener('input', () => { stokEl.value = stokEl.value.replace(/\D/g,''); });

        // Harga — format titik
        const hargaEl = document.getElementById('harga-produk');
        hargaEl.addEventListener('keydown', e => {
            if (['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'].includes(e.key)) return;
            if (!/^\d$/.test(e.key)) e.preventDefault();
        });
        hargaEl.addEventListener('input', () => {
            const raw = hargaEl.value.replace(/\D/g,'');
            hargaEl.value = raw ? raw.replace(/\B(?=(\d{3})+(?!\d))/g,'.') : '';
        });

        // Kamera
        let stream = null;
        document.getElementById('btn-open-camera').addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                document.getElementById('camera-stream').srcObject = stream;
                document.getElementById('camera-modal').style.display = 'flex';
            } catch(err) { alert('Tidak bisa akses kamera: ' + err.message); }
        });

        document.getElementById('btn-capture').addEventListener('click', () => {
            const v = document.getElementById('camera-stream');
            const c = document.getElementById('camera-canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            stopCam();
            // Buka crop modal dengan hasil foto kamera
            openCropModal(c.toDataURL('image/jpeg'));
        });

        document.getElementById('btn-close-camera').addEventListener('click', stopCam);
        function stopCam() {
            if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
            document.getElementById('camera-modal').style.display = 'none';
        }

        // Init image picker & crop
        document.addEventListener('DOMContentLoaded', async () => {
            initImagePicker();
            if (typeof populateKategoriDropdown === 'function') await populateKategoriDropdown();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Produk - E-Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="add-product-body">
    <div class="container py-5" style="max-width: 540px;">
        <div class="card add-product-card shadow-lg">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <a href="index.html" class="text-white small text-decoration-none">&larr; Kembali</a>
                    <h4 class="m-0">Tambah Produk</h4>
                    <div></div>
                </div>

                <div class="image-upload-box mb-4">
                    <div class="image-preview" id="image-preview">
                        <div class="image-placeholder">
                            <div class="placeholder-icon">🖼️</div>
                            <div class="placeholder-text">Belum ada gambar</div>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <label class="btn btn-upload w-100 mb-0">
                            Pilih File
                            <input type="file" id="gambar-produk" accept="image/*" hidden>
                        </label>
                        <label class="btn btn-upload w-100 mb-0">
                            Buka Kamera
                            <input type="file" id="kamera-produk" accept="image/*" capture="environment" hidden>
                        </label>
                    </div>
                </div>

                <form id="form-add-produk">
                    <div class="mb-3">
                        <label class="form-label text-white">Nama Produk *</label>
                        <input type="text" id="nama-produk" class="form-control form-control-dark" placeholder="Masukkan nama produk" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label class="form-label text-white">Stok *</label>
                            <input type="number" id="stok-produk" class="form-control form-control-dark" placeholder="0" min="0" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label text-white">Harga (Rp) *</label>
                            <input type="number" id="harga-produk" class="form-control form-control-dark" placeholder="0" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Kategori *</label>
                        <select id="kategori-produk" class="form-select form-select-dark" required>
                            <option value="" disabled selected>Pilih kategori</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white">Deskripsi</label>
                        <textarea id="deskripsi-produk" class="form-control form-control-dark" rows="4" placeholder="Deskripsi produk (opsional)"></textarea>
                    </div>
                    <button type="submit" class="btn btn-submit w-100">Simpan Produk</button>
                    <a href="index.html" class="btn btn-cancel w-100 mt-3">Batal</a>
                </form>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function updateImagePreview(file) {
            const preview = document.getElementById('image-preview');
            if (!file) {
                preview.innerHTML = '<div class="image-placeholder"><div class="placeholder-icon">🖼️</div><div class="placeholder-text">Belum ada gambar</div></div>';
                return;
            }
            const reader = new FileReader();
            reader.onload = () => {
                preview.innerHTML = `<img src="${reader.result}" alt="Preview Gambar" class="preview-img">`;
            };
            reader.readAsDataURL(file);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await populateKategoriDropdown();
            document.getElementById('form-add-produk').addEventListener('submit', handleAddProduk);

            const fileInput = document.getElementById('gambar-produk');
            const cameraInput = document.getElementById('kamera-produk');

            fileInput.addEventListener('change', (event) => updateImagePreview(event.target.files[0]));
            cameraInput.addEventListener('change', (event) => updateImagePreview(event.target.files[0]));
        });
    </script>
</body>
</html>

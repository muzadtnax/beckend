<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Produk - E-Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 20px;">
            <h3 class="fw-bold mb-4 text-center">Tambah Produk</h3>
            <form id="form-add-produk">
                <div class="mb-3">
                    <label class="form-label">Nama Produk *</label>
                    <input type="text" id="nama-produk" class="form-control" placeholder="Masukkan nama produk" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Stok *</label>
                        <input type="number" id="stok-produk" class="form-control" placeholder="0" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Harga (Rp) *</label>
                        <input type="number" id="harga-produk" class="form-control" placeholder="0" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="deskripsi-produk" class="form-control" rows="3" placeholder="Deskripsi produk (opsional)"></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 fw-bold">Save Produk</button>
                <a href="index.html" class="btn btn-link w-100 mt-2 text-muted text-decoration-none">Kembali ke Beranda</a>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('form-add-produk').addEventListener('submit', handleAddProduk);
    </script>
</body>
</html>

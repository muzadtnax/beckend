<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Katalog Kantin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="custom-nav-container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Logo" width="34" height="34">
                <span>E-Katalog Kantin</span>
            </a>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="dropdown">
                    <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-grid me-1"></i>Kategori
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-egg-fried me-2"></i>Makanan</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-cup-straw me-2"></i>Minuman</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-bag me-2"></i>Lainnya</a></li>
                    <button class="btn btn-outline-dark rounded-pill dropdown-toggle" type="button" data-bs-toggle="dropdown" id="btn-kategori-dropdown">
                        Semua Kategori
                    </button>
                    <ul class="dropdown-menu" id="filter-kategori-menu">
                        <li><a class="dropdown-item" href="#" onclick="filterProduk(null, 'Semua Kategori')">Semua Kategori</a></li>
                        <!-- Kategori dimuat dinamis di sini -->
                    </ul>
                </div>
                <a href="add.html" class="btn btn-dark rounded-pill">
                    <i class="bi bi-plus-lg me-1"></i>Tambah Produk
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container">
        <div class="page-header">
            <h4 class="page-title">Semua Produk</h4>
            <span class="page-count" id="produk-count"></span>
        </div>
        <div class="row g-3" id="produk-container">
            <div class="col-12 state-empty">Memuat produk...</div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        © 2024 <span>E-Katalog Kantin</span>
    </footer>
    <!-- Detail Modal -->
    <div class="modal fade" id="detailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content detail-modal-content">
                <div class="modal-header detail-modal-header">
                    <h5 class="modal-title" id="modalTitle">Detail Produk</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body detail-modal-body">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="detail-image-wrapper">
                                <img id="detailImage" src="" alt="Produk" class="detail-image">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="detail-info">
                                <span class="detail-kategori" id="detailKategori"></span>
                                <h2 class="detail-title" id="detailNama"></h2>
                                
                                <div class="detail-price-section">
                                    <span class="detail-price" id="detailHarga"></span>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Stok Tersedia</div>
                                    <div class="detail-value" id="detailStok"></div>
                                </div>

                                <div class="detail-deskripsi-section">
                                    <div class="detail-label">Deskripsi</div>
                                    <div class="detail-deskripsi" id="detailDeskripsi"></div>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Dibuat</div>
                                    <div class="detail-value" id="detailCreated"></div>
                                </div>

                                <div class="detail-row">
                                    <div class="detail-label">Diperbarui</div>
                                    <div class="detail-value" id="detailUpdated"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer detail-modal-footer">
                    <a href="#" class="btn btn-edit" id="editBtn">
                        <i class="bi bi-pencil me-2"></i>Edit Produk
                    </a>
                    <button type="button" class="btn btn-close-modal" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await displayProduk();
            const items = document.querySelectorAll('#produk-container .col-6');
            if (items.length) {
                document.getElementById('produk-count').textContent = items.length + ' produk';
            }
        // Load produk dan kategori saat halaman dibuka
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof populateKategoriFilter === 'function') {
                await populateKategoriFilter();
            }
            displayProduk();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Katalog Kantin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <div class="custom-nav-container">
            <a class="navbar-brand" href="index.html">
                <img src="images/logo.png" alt="Logo" width="34" height="34">
                <span>E-Katalog Kantin</span>
            </a>
            <div style="display:flex;align-items:center;gap:8px;">
                <div class="dropdown">
                    <button class="btn btn-outline-dark dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-grid me-1"></i>Kategori
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-egg-fried me-2"></i>Makanan</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-cup-straw me-2"></i>Minuman</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-bag me-2"></i>Lainnya</a></li>
                    </ul>
                </div>
                <a href="add.html" class="btn btn-dark rounded-pill">
                    <i class="bi bi-plus-lg me-1"></i>Tambah Produk
                </a>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <div class="container">
        <div class="page-header">
            <h4 class="page-title">Semua Produk</h4>
            <span class="page-count" id="produk-count"></span>
        </div>
        <div class="row g-3" id="produk-container">
            <div class="col-12 state-empty">Memuat produk...</div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer">
        © 2024 <span>E-Katalog Kantin</span>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await displayProduk();
            const items = document.querySelectorAll('#produk-container .col-6');
            if (items.length) {
                document.getElementById('produk-count').textContent = items.length + ' produk';
            }
        });
    </script>
</body>
</html>

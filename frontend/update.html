<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Produk - E-Katalog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container mt-5" style="max-width: 500px;">
        <div class="card border-0 shadow-sm p-4" style="border-radius: 20px;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold m-0">Update Produk</h3>
                <button type="button" id="btn-delete" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">Hapus</button>
            </div>
            
            <form id="form-update-produk">
                <div class="mb-3">
                    <label class="form-label">Nama Produk *</label>
                    <input type="text" id="nama-produk" class="form-control" required>
                </div>
                <div class="row">
                    <div class="col-6 mb-3">
                        <label class="form-label">Stok *</label>
                        <input type="number" id="stok-produk" class="form-control" required>
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Harga (Rp) *</label>
                        <input type="number" id="harga-produk" class="form-control" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Deskripsi</label>
                    <textarea id="deskripsi-produk" class="form-control" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-success w-100 rounded-pill py-2 fw-bold text-white">Simpan Perubahan</button>
                <a href="index.html" class="btn btn-link w-100 mt-2 text-muted text-decoration-none">Batal</a>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Load produk data saat halaman dibuka
        document.addEventListener('DOMContentLoaded', () => {
            loadProdukForEdit();
        });

        // Handle form submit
        document.getElementById('form-update-produk').addEventListener('submit', handleUpdateProduk);

        // Handle delete button
        document.getElementById('btn-delete').addEventListener('click', () => {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (!id) {
                alert('ID produk tidak ditemukan');
                return;
            }
            
            if (confirm('Yakin hapus produk ini? Aksi ini tidak bisa dibatalkan.')) {
                deleteProduk(id).then(result => {
                    if (result.success) {
                        alert('Produk berhasil dihapus');
                        window.location.href = 'index.html';
                    } else {
                        alert('Gagal hapus produk: ' + result.error);
                    }
                });
            }
        });
    </script>
</body>
</html>
